name: palace_pulse
description: O mapa da cena musical - Plataforma de mapeamento para bandas e artistas.
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter
  firebase_core: ^3.8.0
  firebase_auth: ^5.3.3
  firebase_database: ^11.3.2
  go_router: ^14.3.0
  flutter_riverpod: ^2.6.1
  google_fonts: ^6.2.1
  google_sign_in: ^6.2.2
  flutter_svg: ^2.0.10+1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/maps/
